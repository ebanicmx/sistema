<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:380px;
    height:650px;
    background:#fff;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.header{
    background:#25D366;
    color:#fff;
    padding:15px;
    font-weight:bold;
}

.chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    background:#e5ddd5;
}

.message{padding:8px;border-radius:10px;max-width:80%;}
.bot{background:#fff;}
.user{background:#dcf8c6;align-self:flex-end;}

.menu button{
    width:48%;
    margin:1%;
    padding:8px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc;}
button{margin-left:5px;background:#25D366;color:#fff;border:none;border-radius:10px;padding:10px;}
</style>
</head>

<body>

<div class="chat-container">
<div class="header">🤖 Atención</div>
<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Escribe..." />
<button onclick="next()">Enviar</button>
</div>
</div>

<script>
// DB
let db;
const req=indexedDB.open("ClientesDB",1);
req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("clientes",{keyPath:"id",autoIncrement:true});
};
req.onsuccess=e=>db=e.target.result;

// VARIABLES
let modoCashback=false;
let pasoCashback=0;
let cliente={};

const chat=document.getElementById("chat");

// MENSAJES
function msg(t,type="bot"){
    let d=document.createElement("div");
    d.className="message "+type;
    d.innerText=t;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

// MENU
function menu(){
    let div=document.createElement("div");
    div.className="menu";
    div.innerHTML=`
    <button onclick="seleccion('cuenta')">👤 Mi cuenta</button>
    <button onclick="seleccion('pedidos')">📦 Pedidos</button>
    <button onclick="seleccion('promo')">🎉 Promociones</button>
    <button onclick="seleccion('costos')">💰 Costos</button>
    <button onclick="seleccion('error')">⚠️ Error</button>
    <button onclick="seleccion('compra')">🛒 Compra</button>
    <button onclick="seleccion('cashback')">💸 Cashback</button>
    `;
    chat.appendChild(div);
}

// RESPUESTAS
function seleccion(op){

    if(op==="cuenta") msg("👤 Verás tus datos y pedidos.");
    if(op==="pedidos") msg("📦 Tus compras están en tu perfil.");
    if(op==="promo") msg("🎉 Promos en menú principal.");
    if(op==="costos") msg("💰 Envíos gratis Casa Blanca.");
    if(op==="compra") msg("🛒 Compras protegidas.");

    if(op==="cashback"){
        modoCashback=true;
        pasoCashback=0;
        msg("💸 Registro de cashback");
        msg("¿Cuál es tu nombre completo?");
    }
}

// FLUJO
function next(){
    let val=document.getElementById("input").value.trim();
    if(!val) return;

    msg(val,"user");

    if(modoCashback){
        if(pasoCashback===0){
            cliente.nombre=val;
            msg("Ahora tu correo:");
        }
        else if(pasoCashback===1){
            cliente.correo=val;
            msg("Ahora tu número de teléfono:");
        }
        else if(pasoCashback===2){
            cliente.telefono=val;

            msg("🎉 Registro cashback completado");

            // guardar
            let tx=db.transaction("clientes","readwrite");
            tx.objectStore("clientes").add(cliente);

            // enviar WA
            let texto=`Cashback:
Nombre: ${cliente.nombre}
Correo: ${cliente.correo}
Teléfono: ${cliente.telefono}`;

            window.open(`https://wa.me/523318297670?text=${encodeURIComponent(texto)}`);

            modoCashback=false;

            setTimeout(()=>{
                msg("¿Deseas algo más?");
                menu();
            },800);
        }

        pasoCashback++;
    }

    document.getElementById("input").value="";
}

// ENTER
document.getElementById("input").addEventListener("keypress",e=>{
    if(e.key==="Enter") next();
});

// INIT
msg("👋 Bienvenido, selecciona una opción:");
menu();
</script>

</body>
</html>
