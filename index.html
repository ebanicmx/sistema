<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Inteligente</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #e5ddd5;
}

.chat {
    max-width: 500px;
    height: 100vh;
    margin: auto;
    display: flex;
    flex-direction: column;
}

.header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #ece5dd;
}

.msg {
    max-width: 80%;
    padding: 10px;
    border-radius: 10px;
    margin: 5px 0;
}

.bot { background: white; }
.user { background: #dcf8c6; margin-left: auto; }

.input-area {
    display: flex;
    padding: 10px;
    background: white;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

.send {
    margin-left: 5px;
    background: #25D366;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
<div class="header">🛍️ Asistente Virtual</div>
<div class="messages" id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Escribe tu mensaje...">
    <button class="send" onclick="enviar()">➤</button>
</div>
</div>

<script>
let chat = document.getElementById("chat");

// ESTADO
let modo = "";
let datos = {nombre:"", correo:"", telefono:""};

// MENSAJES
function bot(texto){
    let d = document.createElement("div");
    d.className = "msg bot";
    d.innerText = texto;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

function user(texto){
    let d = document.createElement("div");
    d.className = "msg user";
    d.innerText = texto;
    chat.appendChild(d);
}

// IA SIMPLE (detección de intención)
function detectar(texto){

    texto = texto.toLowerCase();

    if(texto.includes("pedido")) return "pedido";
    if(texto.includes("promo")) return "promo";
    if(texto.includes("error")) return "error";
    if(texto.includes("cashback")) return "cashback";
    if(texto.includes("costo") || texto.includes("envio")) return "costo";

    return "general";
}

// ENVIAR MENSAJE
function enviar(){
    let input = document.getElementById("input");
    let texto = input.value;
    if(!texto) return;

    user(texto);

    // FLUJO CASHBACK
    if(modo === "nombre"){
        datos.nombre = texto;
        modo = "correo";
        bot("Perfecto 👍 ahora tu correo electrónico:");
    }

    else if(modo === "correo"){
        if(!texto.includes("@")){
            bot("Correo inválido, intenta nuevamente:");
            return;
        }
        datos.correo = texto;
        modo = "telefono";
        bot("Gracias 🙌 ahora tu número de teléfono:");
    }

    else if(modo === "telefono"){
        datos.telefono = texto;
        bot("✅ Listo, te redirigimos a WhatsApp...");

        let msg = `Cashback:%0ANombre:${datos.nombre}%0ACorreo:${datos.correo}%0ATel:${datos.telefono}`;
        window.open("https://wa.me/523318297670?text="+msg,"_blank");

        modo = "";
    }

    else {

        let tipo = detectar(texto);

        switch(tipo){

            case "pedido":
                bot("📦 Puedes revisar tus pedidos en tu perfil de usuario.");
            break;

            case "promo":
                bot("🔥 Las promociones están en el menú principal de la tienda.");
            break;

            case "costo":
                bot("🚚 Tenemos envíos gratis sin compra mínima.");
            break;

            case "cashback":
                bot("💰 Claro, te ayudo con tu cashback. ¿Cuál es tu nombre?");
                modo = "nombre";
            break;

            case "error":
                bot("⚠️ Describe tu problema y lo enviaremos a soporte.");
                modo = "reporte";
            break;

            default:
                bot("👋 Hola, puedo ayudarte con pedidos, promociones, costos o cashback.");
        }
    }

    input.value = "";
}

// INICIO
bot("Hola 👋 soy tu asistente virtual, ¿en qué puedo ayudarte?");
</script>

</body>
</html>
