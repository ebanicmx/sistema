<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario BANIC</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: url('https://i.ibb.co/kgRPzfrt/imgi-27-looks-para-entrenar-zara.png') no-repeat center center/cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form-container {
        background: #0f0f0f;
        padding: 35px;
        border-radius: 18px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        border: 1px solid #222;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .logo {
        text-align: center;
        font-size: 30px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 2px;
        margin-bottom: 5px;
    }

    .subtitulo {
        text-align: center;
        font-size: 13px;
        color: #aaa;
        margin-bottom: 25px;
    }

    .grupo {
        margin-bottom: 18px;
    }

    label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
        color: #bbb;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #333;
        outline: none;
        font-size: 14px;
        background: #1a1a1a;
        color: #fff;
    }

    input:focus {
        border-color: #fff;
        box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    button {
        width: 100%;
        padding: 14px;
        background: #000;
        color: #fff;
        border: 1px solid #444;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.25s ease;
    }

    button:hover {
        background: #111;
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
        transform: translateY(-2px);
    }

    button:active {
        transform: scale(0.96);
    }
</style>
</head>

<body>

<div class="form-container">
    <div class="logo">BANIC</div>
    <div class="subtitulo">Sistema de cashback</div>

    <form id="formulario">

        <div class="grupo">
            <label>Nombre completo</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="grupo">
            <label>Correo electrónico</label>
            <input type="email" id="correo" required>
        </div>

        <div class="grupo">
            <label>Número de celular</label>
            <input type="tel" id="telefono" required>
        </div>

        <button type="submit">Enviar</button>

    </form>
</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let telefono = document.getElementById("telefono").value;

    let mensaje = `Registro para el cashback de compras:%0A%0A` +
                  `Nombre completo: ${nombre}%0A` +
                  `Correo electrónico: ${correo}%0A` +
                  `Número de celular: ${telefono}`;

    let numeroWhatsApp = "523318297670";

    let url = `https://wa.me/${numeroWhatsApp}?text=${mensaje}`;

    window.open(url, "_blank");
});
</script>

</body>
</html>
